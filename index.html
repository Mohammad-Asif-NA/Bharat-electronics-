<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharat Electronics</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #F0D080;
      --dark: #0A0A0F;
      --dark2: #13131A;
      --dark3: #1C1C28;
      --white: #F5F0E8;
      --muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 80%, rgba(201,168,76,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 60px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 56px 24px 40px;
      position: relative;
    }

    .header::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto;
      margin-top: 24px;
    }

    .logo-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
      background: var(--dark2);
      box-shadow: 0 0 32px rgba(201,168,76,0.25), inset 0 0 20px rgba(201,168,76,0.05);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 32px rgba(201,168,76,0.25), inset 0 0 20px rgba(201,168,76,0.05); }
      50% { box-shadow: 0 0 52px rgba(201,168,76,0.4), inset 0 0 20px rgba(201,168,76,0.08); }
    }

    .logo-icon {
      font-size: 36px;
    }

    .shop-name {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .tagline {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* Cards */
    .section {
      padding: 0 20px;
      margin-top: 32px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .info-card {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 16px;
      overflow: hidden;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }

    .info-row:last-child { border-bottom: none; }
    .info-row:active { background: rgba(201,168,76,0.06); }

    .info-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(201,168,76,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info-text { flex: 1; }
    .info-title { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .info-value { font-size: 15px; color: var(--white); font-weight: 500; }

    /* Buttons */
    .btn-group {
      padding: 0 20px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-primary {
      background: linear-gradient(135deg, #C9A84C, #F0D080, #C9A84C);
      background-size: 200%;
      color: #0A0A0F;
      box-shadow: 0 8px 24px rgba(201,168,76,0.35);
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-secondary {
      background: var(--dark3);
      color: var(--white);
      border: 1px solid rgba(201,168,76,0.25);
    }

    .btn-call {
      background: rgba(52, 199, 89, 0.12);
      color: #34C759;
      border: 1px solid rgba(52, 199, 89, 0.25);
    }

    /* Map preview */
    .map-section {
      padding: 0 20px;
      margin-top: 20px;
    }

    .map-box {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 16px;
      overflow: hidden;
    }

    .map-placeholder {
      height: 160px;
      background: linear-gradient(135deg, var(--dark3), var(--dark2));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        rgba(201,168,76,0.03) 20px,
        rgba(201,168,76,0.03) 40px
      );
    }

    .map-pin { font-size: 36px; }
    .map-text { font-size: 13px; color: var(--muted); letter-spacing: 1px; }

    .map-footer {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-footer-text { font-size: 13px; color: var(--muted); }
    .map-open-btn {
      font-size: 12px;
      color: var(--gold);
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 24px 0;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: rgba(201,168,76,0.3);
      margin: 0 auto 16px;
    }

    .footer-text {
      font-size: 11px;
      color: rgba(136,136,153,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Entrance animation */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header fade-up">
      <div class="logo-ring">
        <span class="logo-icon">⚡</span>
      </div>
      <div class="shop-name">Bharat Electronics</div>
      <div class="tagline">Your Trusted Electronics Store</div>
    </div>

    <!-- Contact Info -->
    <div class="section fade-up delay-1">
      <div class="section-label">Contact</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-icon">📞</div>
          <div class="info-text">
            <div class="info-title">Phone</div>
            <div class="info-value">+91 8528802339</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">📍</div>
          <div class="info-text">
            <div class="info-title">Location</div>
            <div class="info-value">Tap below to open in Maps</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-group fade-up delay-2">
      <a href="https://maps.google.com" class="btn btn-primary" id="mapsBtn">
        📍 &nbsp;Open in Google Maps
      </a>
      <a href="tel:+918528802339" class="btn btn-call">
        📞 &nbsp;Call Now
      </a>
      <a href="https://wa.me/8528802339" class="btn btn-secondary">
        💬 &nbsp;WhatsApp Us
      </a>
    </div>

    <!-- Map Box -->
    <div class="map-section fade-up delay-3">
      <div class="section-label" style="margin-top:12px; margin-bottom:12px;">Our Location</div>
      <div class="map-box">
        <a href="https://maps.google.com" id="mapBoxLink" style="text-decoration:none;">
          <div class="map-placeholder">
            <div class="map-pin">📍</div>
            <div class="map-text">TAP TO VIEW ON MAP</div>
          </div>
        </a>
        <div class="map-footer">
          <span class="map-footer-text">Bharat Electronics</span>
          <a href="https://maps.google.com" class="map-open-btn" id="mapOpenLink">Open Maps →</a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer fade-up delay-4">
      <div class="footer-line"></div>
      <div class="footer-text">Bharat Electronics · Est. 2024</div>
    </div>

  </div>

  <script>
    // REPLACE THIS with your actual Google Maps link
    const MAP_LINK = "https://maps.google.com/?q=your+shop+location";

    document.getElementById('mapsBtn').href = MAP_LINK;
    document.getElementById('mapBoxLink').href = MAP_LINK;
    document.getElementById('mapOpenLink').href = MAP_LINK;
  </script>
</body>
</html>
